<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>LOGIN</title>

<body>

        <h3>MY WEBSITE</h3>

        <ul>
            <li>Home</li>
            <li>Products</li>
            <li>Feedbacks</li>

    <div class="main-card">
        <h1 style="margin-top: -30px;">LOGIN</h1>

        <form>
            <label>USERNAME:</label>

            <input type="password" style="font-size: 20px;">
            <br>
            <button>ENTER</button>
            <a href="" id="forgot-pin">Forgot your password?</a>

        <a id="sign-up">Don't have an account? Sign Up</a>
    </div>
